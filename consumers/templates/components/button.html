{% comment %}
Usage: {% include 'components/button.html' with text='Save' variant='primary' icon='save' type='submit' %}
Use 'href' to render as an anchor link instead of a button.
{% endcomment %}

{% if href %}
<a href="{{ href }}" class="btn-{{ variant|default:'primary' }} {{ extra_classes }}" {% if id %}id="{{ id }}"{% endif %} {% if attributes %}{{ attributes|safe }}{% endif %}>
    {% if icon %}<i class="bi bi-{{ icon }}"></i>{% endif %}
    {{ text }}
</a>
{% else %}
<button type="{{ type|default:'button' }}" class="btn-{{ variant|default:'primary' }} {{ extra_classes }}" {% if id %}id="{{ id }}"{% endif %} {% if attributes %}{{ attributes|safe }}{% endif %}>
    {% if icon %}<i class="bi bi-{{ icon }}"></i>{% endif %}
    {{ text }}
</button>
{% endif %}
